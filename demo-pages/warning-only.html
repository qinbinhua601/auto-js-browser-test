<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>warning-only</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 32px;
        line-height: 1.6;
        background: #f6f8fb;
        color: #162031;
      }
      .card {
        max-width: 760px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(31, 54, 88, 0.12);
      }
      .meta {
        color: #4f647d;
      }
      code {
        background: #eef2f7;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Demo Case: warning-only</h1>
      <p class="meta">Expected result: <code>PASS</code></p>
      <p>This page only emits <code>console.warn</code>. It should not be treated as a failure.</p>
    </main>
    <script>
      window.addEventListener("load", () => {
        setTimeout(() => {
          console.warn("compat demo warning");
        }, 300);
      });
    </script>
  </body>
</html>
